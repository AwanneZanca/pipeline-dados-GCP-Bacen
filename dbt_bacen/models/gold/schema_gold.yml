version: 2

models:

  # ── Dimensão Tempo ──────────────────────────────────────────────────────────
  - name: dim_tempo
    description: >
      Dimensão calendário com granularidade diária.
      Gerada a partir do range de datas presente em stg_indicadores e stg_ibge.
    columns:
      - name: sk_tempo
        description: "Surrogate key - formato AAAAMMDD"
        tests:
          - not_null
          - unique

      - name: data
        description: "Data no formato DATE"
        tests:
          - not_null
          - unique

      - name: ano
        description: "Ano da data"
        tests:
          - not_null

      - name: mes
        description: "Mes numerico 1-12"
        tests:
          - not_null

      - name: trimestre
        description: "Trimestre 1-4"
        tests:
          - not_null

  # ── Dimensão Indicador ──────────────────────────────────────────────────────
  - name: dim_indicador
    description: >
      Dimensão com metadados de todos os indicadores economicos —
      BACEN e IBGE (SIDRA). Inclui categoria, unidade de medida,
      frequencia, fonte, localidade e classificacao.
    columns:
      - name: sk_indicador
        description: "Surrogate key gerado por row_number"
        tests:
          - not_null
          - unique

      - name: nome_indicador
        description: "Nome legivel do indicador"
        tests:
          - not_null

      - name: fonte
        description: "Fonte do indicador - BACEN ou IBGE"
        tests:
          - not_null
          - accepted_values:
              values: ["BACEN", "IBGE"]

      - name: localidade
        description: "Localidade do indicador - Brasil, Sudeste, Nordeste, etc"
        tests:
          - not_null

      - name: categoria
        description: "Categoria economica do indicador"
        tests:
          - not_null

      - name: unidade_medida
        description: "Unidade de medida do indicador"
        tests:
          - not_null

  # ── Fato Indicadores ────────────────────────────────────────────────────────
  - name: fato_indicadores
    description: >
      Tabela fato central do Star Schema. Une dados do BACEN e IBGE.
      Granularidade de 1 linha por indicador + localidade + classificacao
      por data. Particionada por mes e clusterizada por fonte, categoria
      e nome do indicador.
    columns:
      - name: fk_tempo
        description: "FK para dim_tempo.sk_tempo"
        tests:
          - not_null
          - relationships:
              to: ref('dim_tempo')
              field: sk_tempo

      - name: fk_indicador
        description: "FK para dim_indicador.sk_indicador"
        tests:
          - not_null
          - relationships:
              to: ref('dim_indicador')
              field: sk_indicador

      - name: data
        description: "Data de referencia do valor"
        tests:
          - not_null

      - name: nome_indicador
        description: "Nome do indicador"
        tests:
          - not_null

      - name: fonte
        description: "Fonte do dado - BACEN ou IBGE"
        tests:
          - not_null

      - name: localidade
        description: "Localidade do indicador"
        tests:
          - not_null

      - name: valor
        description: "Valor do indicador na data de referencia"
        tests:
          - not_null

      - name: variacao_absoluta
        description: "Diferenca absoluta em relacao ao periodo anterior"

      - name: variacao_percentual
        description: "Variacao percentual em relacao ao periodo anterior"

      - name: media_movel_30d
        description: "Media movel dos ultimos 30 dias"

      - name: media_movel_90d
        description: "Media movel dos ultimos 90 dias"

      - name: codigo_serie
        description: "Codigo da serie BACEN ou tabela IBGE"
        tests:
          - not_null
